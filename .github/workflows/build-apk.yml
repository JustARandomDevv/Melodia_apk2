name: Build APK Melodia

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Vérification rapide de syntaxe (Python & KV)
        run: |
          # 1. Vérification des fichiers Python
          python -m py_compile main.py
          find app -name "*.py" -exec python -m py_compile {} \;
          
          # 2. Vérification rapide des fichiers KV (sans lancer Kivy)
          python -c "
          import os
          kv_dir = 'app/kv'
          if os.path.exists(kv_dir):
              for fname in os.listdir(kv_dir):
                  if fname.endswith('.kv'):
                      with open(os.path.join(kv_dir, fname), 'r', encoding='utf-8') as f:
                          content = f.read()
                          # Simple structural check to ensure file is not empty or corrupted
                          if len(content).strip() == 0:
                              raise ValueError(f'{fname} est vide')
              print('Fichiers KV structurellement valides')
          "

      - name: Installer les dépendances système Buildozer
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev cmake libffi-dev \
            libssl-dev automake build-essential ccache

      - name: Installer Buildozer et Cython
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Cache Buildozer (accélère les builds suivants)
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-

      - name: Compiler l'APK (debug)
        run: |
          yes | buildozer android debug
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Localiser l'APK généré
        run: find . -name "*.apk"

      - name: Uploader l'APK comme artefact
        uses: actions/upload-artifact@v4
        with:
          name: melodia-apk
          path: bin/*.apk
          retention-days: 30
